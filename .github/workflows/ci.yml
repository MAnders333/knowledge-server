name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check & test
    runs-on: ubuntu-latest

    services:
      postgres:
        # Ephemeral CI-only instance — credentials are not secret.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ks
          POSTGRES_PASSWORD: ks
          POSTGRES_DB: knowledge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          PG_TEST_URI: postgres://ks:ks@localhost:5432/knowledge
